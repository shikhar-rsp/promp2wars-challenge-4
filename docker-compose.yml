# ATLAS — one-command local stack. Runs fully offline (simulator provider) if
# no AI keys are supplied; set any of the *_API_KEY vars to enable live AI.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4000:4000'
    environment:
      API_PORT: 4000
      API_HOST: 0.0.0.0
      CORS_ORIGINS: http://localhost:3000
      NODE_ENV: production
      # Optional — failover order OpenRouter -> Groq -> Cerebras -> Gemini.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped
